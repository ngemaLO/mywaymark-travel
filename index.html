<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Waymark — Private Travel Journal</title>
    <meta name="description" content="A quiet place to trace where you&#39;ve been. Your private travel journal.">
    <meta name="author" content="Waymark" />

    <!-- Theme color for browser chrome -->
    <meta name="theme-color" content="#eef0f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#060b14" media="(prefers-color-scheme: dark)" />

    <!-- Font preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Waymark" />
    
    <!-- Prevent telephone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph -->
    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Waymark" />
    <meta name="twitter:image" content="/og-image.png">
    <meta property="og:title" content="Waymark — Private Travel Journal">
  <meta name="twitter:title" content="Waymark — Private Travel Journal">
  <meta property="og:description" content="A quiet place to trace where you&#39;ve been. Your private travel journal.">
  <meta name="twitter:description" content="A quiet place to trace where you&#39;ve been. Your private travel journal.">
</head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
